<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz - Guess the name of the capital of the various countries</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="https://static.vecteezy.com/system/resources/thumbnails/018/766/186/small_2x/quiz-guess-social-media-icon-in-flat-style-faq-illustration-on-isolated-background-help-button-sign-business-concept-vector.jpg"
    />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="container">
      <div class="screen active" id="start-screen">
        <h1>Quiz Time!</h1>
        <p>Test your knowledge with these fun questions</p>
        <button id="start-btn">Start Quiz</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text"></h2>
          <div class="quiz-info">
            <p>
              Question <span id="current-question">1</span> of
              <span id="total-questions">5</span>
            </p>
            <p>00:0<span id="time"></span></p>
            <p>Score: <span id="score">0</span></p>
          </div>
        </div>

        <div id="answers-container" class="answers-container">
          <!-- Answers bottons here -->
        </div>

        <div class="progress-bar">
          <div id="progress" class="progress"></div>
        </div>
      </div>

      <div id="result-screen" class="screen">
        <h1>Quiz Results</h1>
        <div class="result-info">
          <p>
            Your scored <span id="final-score">0</span> out of
            <span id="max-score">5</span>
          </p>
          <div id="result-message"></div>
        </div>
        <button id="restart-btn">Restart</button>
      </div>
    </div>
  </body>
</html>
